# Chainlink CRE Project Configuration for PrivOTC
name: privotc-cre
version: 1.0.0
description: PrivOTC Confidential OTC Trading Platform with ZK Proof Integration

# Development settings
development-settings:
  chain:
    ethereum-sepolia:
      rpc-url: ${ETHEREUM_SEPOLIA_RPC}
  account:
    workflow-owner-address: ${CRE_WORKFLOW_OWNER_ADDRESS}

# Production settings (Tenderly Virtual TestNets)
production-settings:
  chain:
    ethereum-mainnet:
      rpc-url: ${ETHEREUM_MAINNET_RPC}
    base-mainnet:
      rpc-url: ${BASE_MAINNET_RPC}
  account:
    workflow-owner-address: ${CRE_WORKFLOW_OWNER_ADDRESS}
